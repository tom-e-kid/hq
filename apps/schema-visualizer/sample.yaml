format: chunk-schema/v1
database: postgresql

categories:
  - id: AC
    label: Account
    description: ユーザーアカウント・住所
  - id: PD
    label: Product
    description: 商品カタログ（カテゴリ・商品・レビュー）
  - id: OD
    label: Order
    description: 注文・決済

tables:
  # ── AC - Account ─────────────────────────────────────────
  - id: AC-01
    name: user
    category: AC
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: email
        type: text
        unique: true
      - name: name
        type: text
      - name: avatar_url
        type: text
        nullable: true
      - name: created_at
        type: timestamp
        default: now
      - name: updated_at
        type: timestamp
        default: now

  - id: AC-02
    name: address
    category: AC
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: user_id
        type: text
        fk: { table: user, column: id, on_delete: CASCADE }
      - name: label
        type: text
      - name: postal_code
        type: text
      - name: prefecture
        type: text
      - name: city
        type: text
      - name: line1
        type: text
      - name: line2
        type: text
        nullable: true
      - name: is_default
        type: boolean
        default: "false"
      - name: created_at
        type: timestamp
        default: now
    indexes:
      - columns: [user_id]

  # ── PD - Product ─────────────────────────────────────────
  - id: PD-01
    name: category
    category: PD
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: slug
        type: text
        unique: true
      - name: name
        type: text
      - name: parent_id
        type: text
        nullable: true
        fk: { table: category, column: id, on_delete: SET_NULL }
      - name: display_order
        type: integer
        default: "0"
      - name: created_at
        type: timestamp
        default: now

  - id: PD-02
    name: product
    category: PD
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: category_id
        type: text
        nullable: true
        fk: { table: category, column: id, on_delete: SET_NULL }
      - name: name
        type: text
      - name: slug
        type: text
        unique: true
      - name: description
        type: text
        nullable: true
      - name: price
        type: integer
      - name: stock
        type: integer
        default: "0"
      - name: is_published
        type: boolean
        default: "false"
      - name: metadata
        type: jsonb
        nullable: true
      - name: created_at
        type: timestamp
        default: now
      - name: updated_at
        type: timestamp
        default: now
    indexes:
      - columns: [category_id]

  - id: PD-03
    name: product_image
    category: PD
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: product_id
        type: text
        fk: { table: product, column: id, on_delete: CASCADE }
      - name: url
        type: text
      - name: display_order
        type: integer
        default: "0"
    indexes:
      - columns: [product_id]

  - id: PD-04
    name: review
    category: PD
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: product_id
        type: text
        fk: { table: product, column: id, on_delete: CASCADE }
      - name: user_id
        type: text
        fk: { table: user, column: id, on_delete: CASCADE }
      - name: rating
        type: integer
      - name: comment
        type: text
        nullable: true
      - name: created_at
        type: timestamp
        default: now
    unique:
      - [product_id, user_id]

  # ── OD - Order ───────────────────────────────────────────
  - id: OD-01
    name: order
    category: OD
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: user_id
        type: text
        fk: { table: user, column: id, on_delete: CASCADE }
      - name: shipping_address_id
        type: text
        nullable: true
        fk: { table: address, column: id, on_delete: SET_NULL }
      - name: status
        type: text
        default: pending
      - name: total_amount
        type: integer
      - name: note
        type: text
        nullable: true
      - name: created_at
        type: timestamp
        default: now
      - name: updated_at
        type: timestamp
        default: now
    indexes:
      - columns: [user_id]

  - id: OD-02
    name: order_item
    category: OD
    columns:
      - name: order_id
        type: text
        fk: { table: order, column: id, on_delete: CASCADE }
      - name: product_id
        type: text
        fk: { table: product, column: id, on_delete: CASCADE }
      - name: quantity
        type: integer
      - name: unit_price
        type: integer
    pk: [order_id, product_id]

  - id: OD-03
    name: payment
    category: OD
    columns:
      - name: id
        type: text
        pk: true
        default: uuid_auto
      - name: order_id
        type: text
        fk: { table: order, column: id, on_delete: CASCADE }
      - name: method
        type: text
      - name: amount
        type: integer
      - name: status
        type: text
        default: pending
      - name: paid_at
        type: timestamp
        nullable: true
      - name: created_at
        type: timestamp
        default: now
    indexes:
      - columns: [order_id]

relations:
  # AC
  - from: address
    to: user
    type: CASCADE

  # PD → PD (self-ref)
  - from: category
    to: category
    type: SET_NULL
    column: parent_id

  # PD → AC
  - from: review
    to: user
    type: CASCADE

  # PD internal
  - from: product
    to: category
    type: SET_NULL
  - from: product_image
    to: product
    type: CASCADE
  - from: review
    to: product
    type: CASCADE

  # OD → AC
  - from: order
    to: user
    type: CASCADE
  - from: order
    to: address
    type: SET_NULL

  # OD → PD
  - from: order_item
    to: product
    type: CASCADE

  # OD internal
  - from: order_item
    to: order
    type: CASCADE
  - from: payment
    to: order
    type: CASCADE
